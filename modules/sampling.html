<div class="page" id="page-sampling">
        <div class="section-header">
          <div>
            <!--<div class="section-title">Sampling Tracker</div>-->
            <div class="section-subtitle">New customer samples only · Status tracked per batch</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openNewSampleModal()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>Log Sample
          </button>
        </div>
        <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
          <div class="stat-card purple"><div class="stat-label">Samples Sent</div><div class="stat-value" id="stat-samples-sent">0</div><div class="stat-change up">This month</div><div class="stat-icon purple"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"></path></svg></div></div>
          <div class="stat-card amber"><div class="stat-label">Awaiting Feedback</div><div class="stat-value" id="stat-samples-pending">0</div><div class="stat-change">Follow up needed</div><div class="stat-icon amber"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div></div>
          <div class="stat-card teal"><div class="stat-label">Approved → Order</div><div class="stat-value" id="stat-samples-approved">0</div><div class="stat-change up">Converted</div><div class="stat-icon teal"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div></div>
          <div class="stat-card blue"><div class="stat-label">Rejected</div><div class="stat-value" id="stat-samples-rejected">0</div><div class="stat-change down">Need re-formulation</div><div class="stat-icon blue"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Sample Register</div></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Sample ID</th><th>Customer</th><th>Product</th><th>Qty Sent</th><th>Sent Date</th><th>Follow-up Due</th><th>Status</th><th>Outcome</th><th>Actions</th></tr></thead>
              <tbody id="samples-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
