<!-- Follow-up History Module -->
<div class="section-header">
  <div>
    <div class="section-title">Follow-up History</div>
    <div class="section-subtitle">All completed follow-ups &middot; Live from Supabase</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <input id="fh-search" type="text" placeholder="Search by lead, notes..." 
      style="padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;width:220px;"
      oninput="filterFhTable()">
    <button class="btn btn-secondary btn-sm" onclick="loadFhHistory()">Refresh</button>
    <button class="btn btn-secondary btn-sm" onclick="exportFhCsv()">⬇ Export</button>
  </div>
</div>

<!-- Stats row -->
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
  <div class="stat-card"><div id="fh-stat-total" class="stat-value">—</div><div class="stat-label">TOTAL DONE</div></div>
  <div class="stat-card"><div id="fh-stat-positive" class="stat-value" style="color:#22c55e;">—</div><div class="stat-label">POSITIVE</div></div>
  <div class="stat-card"><div id="fh-stat-neutral" class="stat-value" style="color:#f59e0b;">—</div><div class="stat-label">NEUTRAL</div></div>
  <div class="stat-card"><div id="fh-stat-negative" class="stat-value" style="color:#ef4444;">—</div><div class="stat-label">NEGATIVE</div></div>
</div>

<!-- Table -->
<div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;">
  <table id="fh-table" style="width:100%;border-collapse:collapse;font-size:13px;">
    <thead>
      <tr style="background:#f8fafc;border-bottom:1.5px solid #e2e8f0;">
        <th style="padding:12px 16px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Lead / Ref</th>
        <th style="padding:12px 16px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Type</th>
        <th style="padding:12px 16px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Original Date</th>
        <th style="padding:12px 16px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Outcome</th>
        <th style="padding:12px 16px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Original Notes</th>
        <th style="padding:12px 16px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Completion Notes</th>
        <th style="padding:12px 16px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Completed At</th>
      </tr>
    </thead>
    <tbody id="fh-tbody">
      <tr><td colspan="7" style="padding:40px;text-align:center;color:#94a3b8;">Loading history...</td></tr>
    </tbody>
  </table>
</div>
